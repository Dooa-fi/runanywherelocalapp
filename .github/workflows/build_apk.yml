name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Regenerate Android build files
        run: |
          # Save our custom AndroidManifest with permissions
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml
          # Remove incomplete hand-written android/ and let Flutter generate proper boilerplate
          rm -rf android/
          flutter create --org com.hackathon --project-name runanywhere_copilot --platforms android .
          # Restore our manifest (RECORD_AUDIO, INTERNET, largeHeap)
          cp /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          # Set minSdkVersion 24 (required by RunAnywhere SDK)
          sed -i 's/minSdk.*/minSdk = 24/' android/app/build.gradle.kts 2>/dev/null || \
          sed -i 's/minSdkVersion.*/minSdkVersion 24/' android/app/build.gradle 2>/dev/null || true
          # Enable largeHeap via manifest (already in our manifest)

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: runanywhere-offline-copilot
          path: build/app/outputs/flutter-apk/app-release.apk
